<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content=
"width=device-width,initial-scale=1">

<title>
Happy Birthday ❤️
</title>

<link
rel="stylesheet"
href="style.css">

</head>



<body>

<!-- Background -->

<img
id="bg1"
class="bg active"
src="https://i.ibb.co/VcBqsh9P/1.jpg">

<img
id="bg2"
class="bg"
src="https://i.ibb.co/cSd0zPyq/2.jpg">

<img
id="bg3"
class="bg"
src="https://i.ibb.co/hJrfFrWs/3.jpg">

<div class="overlay"></div>



<div class="container">

<!-- Start -->

<div
id="start"
class="page">

<h1>
en chlm yaru ❤️
</h1>

<input
id="name"
placeholder=
"Enter here">

<br>

<button
onclick=
"startGift()">

Start

</button>

</div>



<!-- Welcome -->

<div
id="welcome"
class=
"page hidden">

<h1>

Happy Birthday
karadi kutti ❤️

</h1>

<img
class=
"hero"
src=
"https://i.ibb.co/7tqvm2Kx/image-91519937.png">

<p>

This is for you 🌸

</p>

<button
onclick=
"showQuestion()">

Continue

</button>

</div>



<!-- Questions -->

<div
id=
"questionPage"

class=
"page hidden">

<h2 id="qText">

</h2>

<input
id="answer">

<br>

<button
onclick=
"submitAnswer()">

Submit

</button>

<div id="result">

</div>

<h3>

Flowers:

<span
id=
"flowers">

🌸

</span>

</h3>

</div>



<!-- Photos -->

<div
id=
"photos"

class=
"page hidden">

<h1>

Our Memories ❤️

</h1>

<div
class=
"gallery">

<img
src=
"https://i.ibb.co/VcBqsh9P/1.jpg">

<img
src=
"https://i.ibb.co/cSd0zPyq/2.jpg">

<img
src=
"https://i.ibb.co/hJrfFrWs/3.jpg">

</div>

<button
onclick=
"openLetter()">

Open Letter 💌

</button>

</div>



<!-- Letter -->

<div
id=
"letterPage"

class=
"page hidden">

<h1>

For You ❤️

</h1>

<div
id=
"flowerCount">

</div>

<div
id=
"letter">

</div>

</div>

</div>



<!-- Music -->

<audio
id=
"bgmusic"
loop>

<source
src=
"https://files.catbox.moe/pugt87.mp3"
type=
"audio/mp3">

</audio>



<script
src=
"script.js">

</script>

</body>

</html>
